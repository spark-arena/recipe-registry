framework: llama-benchy
metadata:
  description: Spark Arena Benchmark Profile v2
args:
  depth: [ 0, 4096, 8192, 16384, 32768, 65535, 100000 ]
  pp: [ 2048 ]
  tg: [ 128 ]
  concurrency: [ 1, 2, 5, 10 ]
  prefix_caching: true
  runs: 3

