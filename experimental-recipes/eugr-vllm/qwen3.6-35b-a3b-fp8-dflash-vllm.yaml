recipe_version: "2"
model: Qwen/Qwen3.6-35B-A3B-FP8
runtime: vllm
min_nodes: 2
container: ghcr.io/spark-arena/dgx-vllm-eugr-nightly:latest

metadata:
  description: Qwen3.6-35B-A3B-FP8 with DFlash speculative decoding (z-lab draft, 15 tokens)

mods:
  - mods/fix-qwen3.6-chat-template

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  pipeline_parallel: 1
  gpu_memory_utilization: 0.7
  max_model_len: 262144
  max_num_batched_tokens: 16384
  load_format: fastsafetensors
  attention_backend: flash_attn
  tool_call_parser: qwen3_xml
  reasoning_parser: qwen3
  speculative_config: '{"method": "dflash", "model": "z-lab/Qwen3.6-35B-A3B-DFlash", "num_speculative_tokens": 15}'

env:
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"

command: |
  vllm serve {model} \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-auto-tool-choice \
    --tool-call-parser {tool_call_parser} \
    --reasoning-parser {reasoning_parser} \
    --load-format {load_format} \
    --attention-backend {attention_backend} \
    --chat-template fixed_chat_template.jinja \
    --speculative-config '{speculative_config}' \
    -tp {tensor_parallel} \
    -pp {pipeline_parallel}
