recipe_version: "2"
model: deepseek-ai/DeepSeek-V4-Flash
runtime: vllm
container: scitrera/dgx-spark-vllm-jasl-ds4:20260609
min_nodes: 2

metadata:
  description: DeepSeek-V4-Flash

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  pipeline_parallel: 1
  data_parallel: 1
  gpu_memory_utilization: 0.825
  max_model_len: 256000
  max_num_seqs: 10
  max_num_batched_tokens: 6144
  max_cudagraph_capture_size: 8
  load_format: instanttensor
  kv_cache_dtype: fp8
  tool_call_parser: deepseek_v4
  reasoning_parser: deepseek_v4
  tokenizer_mode: deepseek_v4
  compilation_config: '{"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}'

env:
  TILELANG_CLEANUP_TEMP_FILES: "1"
  VLLM_TRITON_MLA_SPARSE: "1"
  VLLM_TRITON_MLA_SPARSE_HEAD_BLOCK_SIZE: "4"
  # jasl sm120_tp2 long-context profile: larger sparse-MLA chunks than vLLM
  # defaults (QUERY default 256 -> 512; TOPK matches default 512, set explicit).
  VLLM_TRITON_MLA_SPARSE_QUERY_CHUNK_SIZE: "512"
  VLLM_TRITON_MLA_SPARSE_TOPK_CHUNK_SIZE: "512"

# --attention_config.use_fp4_indexer_cache=True \
command: |
  vllm serve {model} \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --max-num-seqs {max_num_seqs} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --trust-remote-code \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-auto-tool-choice \
    --tool-call-parser {tool_call_parser} \
    --tokenizer-mode {tokenizer_mode} \
    --reasoning-parser {reasoning_parser} \
    --kv-cache-dtype {kv_cache_dtype} \
    --load-format {load_format} \
    --compilation-config '{compilation_config}' \
    --enable-prefix-caching \
    --max-cudagraph-capture-size {max_cudagraph_capture_size} \
    -tp {tensor_parallel} \
    -pp {pipeline_parallel}
